<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godiya | MIQRA SCHOOL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f0f2f5 0%, #c2e9fb 100%);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .thank-you-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .thank-you-card { 
            text-align: center; 
            padding: 50px 40px; 
            border-radius: 25px; 
            background: white; 
            border-top: 8px solid #198754;
            animation: fadeIn 0.8s ease-in-out;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .check-icon {
            color: #198754;
            font-size: 80px;
            margin-bottom: 25px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .redirect-text {
            font-size: 0.85rem;
            margin-top: 20px;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader text-center">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 fw-bold text-success">MIQRA SCHOOL...</p>
        </div>
    </div>

    <nav class="navbar navbar-dark bg-success sticky-top border-bottom border-warning shadow-sm">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="MIQRA Logo" width="45" height="45" class="me-2 rounded-circle bg-white p-1">
                <span>MIQRA SCHOOL</span>
            </a>
        </div>
    </nav>

    <div class="thank-you-container">
        <div class="thank-you-card border-0">
            <div class="check-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 class="fw-bold text-dark mb-3">Mun Gode!</h1>
            <p class="lead text-muted mb-4">
                Mun karɓi saƙonku ko neman gurbin karatunku cikin nasara. 
                <br><span class="small fw-bold text-success text-uppercase">Za mu tuntuɓe ku ba da daɗewa ba.</span>
            </p>
            
            <div class="d-grid gap-2">
                <a href="index.html" class="btn btn-warning btn-lg px-5 rounded-pill shadow-sm fw-bold text-dark transition-all">
                    <i class="fas fa-home me-2"></i> Koma Shafin Gida
                </a>
            </div>

            <p class="redirect-text">
                Za a mayar da kai shafin gida cikin <span id="countdown" class="fw-bold text-success">10</span> sakanni...
            </p>

            <p class="mt-4 text-muted small">© 2026 MIQRA Official Website</p>
        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3">
        <p class="mb-0 small opacity-75">Bompai Rd, Kano 700213.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script> 
    
    <script>
        // Tsarin Auto-Redirect bayan 10 seconds
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";
            }
        }, 1000);
    </script>
</body>
</html>
