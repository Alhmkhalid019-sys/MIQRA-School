<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yi Rajista | MIQRA SCHOOL</title>
    <link href="https://cdn.npm.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 rounded-4" style="max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <img src="Images/logo.png" width="70" alt="Logo">
                <h3 class="fw-bold text-success mt-2">Sabon Rajista</h3>
            </div>
            <form id="signupForm">
                <div class="mb-3">
                    <label class="form-label">Cikakken Suna</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email ko Lambar Waya</label>
                    <input type="text" id="userContact" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="userPass" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">Yi Rajista</button>
            </form>
            <p class="text-center mt-3">Kana da account? <a href="login.html" class="text-success">Shiga nan</a></p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
