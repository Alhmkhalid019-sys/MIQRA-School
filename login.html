<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MIQRA SCHOOL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #198754 0%, #0d5a35 100%);
            height: 100 vh;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
        }
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #ffc107;
            color: #000;
            border-color: #ffc107;
        }
    </style>
</head>
<body class="d-flex align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                
                <div class="text-center mb-3">
                    <a href="index.html" class="text-white text-decoration-none small">
                        <i class="fas fa-arrow-left me-1"></i> Koma Shafin Gida
                    </a>
                </div>

                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <img src="images/logo.png" alt="Logo" width="80" class="mb-2 rounded-circle shadow-sm bg-white p-1">
                        <h3 class="fw-bold text-success">Shiga Shafin</h3>
                        <p class="text-muted small">Shigar da bayanan ka don cigaba</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email ko Lambar Waya</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-success"></i></span>
                                <input type="text" id="loginUser" class="form-control border-start-0 bg-light" placeholder="misali@gmail.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-success"></i></span>
                                <input type="password" id="loginPass" class="form-control border-start-0 bg-light" placeholder="********" required>
                            </div>
                        </div>

                        <div class="mb-3 d-flex justify-content-between">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">Ka tuna ni</label>
                            </div>
                            <a href="#" class="small text-success text-decoration-none">Ka manta password?</a>
                        </div>

                        <button type="submit" class="btn btn-success w-100 btn-login shadow-sm">LOGIN</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted">Ba ka da account? <a href="signup.html" class="text-success fw-bold text-decoration-none">Yi Register anan</a></p>
                    </div>
                </div>

                <div class="text-center mt-4 text-white-50">
                    <p class="small">© 2026 MIQRA School Portal</p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>

</body>
</html>
