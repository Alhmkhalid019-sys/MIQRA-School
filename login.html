<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <title>Login | MIQRA SCHOOL</title>
    <link href="https://cdn.npm.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-success">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-sm p-4 rounded-4" style="max-width: 400px; width: 100%;">
            <h3 class="text-center fw-bold text-success">Shiga Shafin</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" id="loginUser" class="form-control" placeholder="Email ko Number" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="loginPass" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Login</button>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
